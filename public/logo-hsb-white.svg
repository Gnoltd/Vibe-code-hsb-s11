<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="white"/>

  <!-- QR corner squares (top-left) -->
  <rect x="12" y="12" width="22" height="22" rx="3" fill="#003087"/>
  <rect x="16" y="16" width="14" height="14" rx="1" fill="white"/>
  <rect x="19" y="19" width="8" height="8" rx="1" fill="#003087"/>

  <!-- QR corner squares (top-right) -->
  <rect x="66" y="12" width="22" height="22" rx="3" fill="#003087"/>
  <rect x="70" y="16" width="14" height="14" rx="1" fill="white"/>
  <rect x="73" y="19" width="8" height="8" rx="1" fill="#003087"/>

  <!-- QR corner squares (bottom-left) -->
  <rect x="12" y="66" width="22" height="22" rx="3" fill="#003087"/>
  <rect x="16" y="70" width="14" height="14" rx="1" fill="white"/>
  <rect x="19" y="73" width="8" height="8" rx="1" fill="#003087"/>

  <!-- Gold accent dots -->
  <rect x="66" y="66" width="8" height="8" rx="1" fill="#C8960C"/>
  <rect x="78" y="66" width="8" height="8" rx="1" fill="#003087"/>
  <rect x="66" y="78" width="8" height="8" rx="1" fill="#003087"/>
  <rect x="78" y="78" width="8" height="8" rx="1" fill="#C8960C"/>

  <!-- HSB text in blue -->
  <text x="50" y="56" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#003087" text-anchor="middle" letter-spacing="2">HSB</text>
</svg>
